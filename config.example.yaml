# Path to the markdown/text file injected into Hermes conversations.
# Relative paths are resolved from this plugin directory.
context_path: ./context.md

# Platform access is explicit and platform-scoped.
# Hermes core currently uses these platform keys in pre_llm_call:
# - cli, cron
# - local, telegram, discord, whatsapp, slack, signal, mattermost, matrix
# - homeassistant, email, sms, dingtalk, api_server, webhook, msgraph_webhook
# - feishu, wecom, wecom_callback, weixin, bluebubbles, qqbot, yuanbao
#
# enabled: true enables injection for that platform.
# allowed_sender_ids is optional. Empty means any sender on that enabled platform.
# cli is the ordinary interactive Hermes CLI surface.
# cron is Hermes scheduled-job execution; leave disabled unless scheduled jobs should see this context.
# local is Hermes' local-machine session source, not an external messaging adapter.
# CLI currently has no Hermes sender ID; leave cli.allowed_sender_ids empty.
# For gateway platforms, the sender ID is Hermes SessionSource.user_id.
# Examples:
# - Slack: U123EXAMPLE or <@U123EXAMPLE>
# - Discord: 123456789012345678
# - Telegram: 123456789
# - Email/SMS/Signal/WhatsApp/iMessage-style platforms often use address/phone/JID-like IDs.
platforms:
  cli:
    enabled: true
    allowed_sender_ids: []  # CLI has no Hermes sender ID; keep this empty.
  cron:
    enabled: false
    allowed_sender_ids: []
  local:
    enabled: false
    allowed_sender_ids: []
  telegram:
    enabled: false
    allowed_sender_ids: []
  discord:
    enabled: false
    allowed_sender_ids: []
  whatsapp:
    enabled: false
    allowed_sender_ids: []
  slack:
    enabled: false
    allowed_sender_ids: []
  signal:
    enabled: false
    allowed_sender_ids: []
  mattermost:
    enabled: false
    allowed_sender_ids: []
  matrix:
    enabled: false
    allowed_sender_ids: []
  homeassistant:
    enabled: false
    allowed_sender_ids: []
  email:
    enabled: false
    allowed_sender_ids: []
  sms:
    enabled: false
    allowed_sender_ids: []
  dingtalk:
    enabled: false
    allowed_sender_ids: []
  api_server:
    enabled: false
    allowed_sender_ids: []
  webhook:
    enabled: false
    allowed_sender_ids: []
  msgraph_webhook:
    enabled: false
    allowed_sender_ids: []
  feishu:
    enabled: false
    allowed_sender_ids: []
  wecom:
    enabled: false
    allowed_sender_ids: []
  wecom_callback:
    enabled: false
    allowed_sender_ids: []
  weixin:
    enabled: false
    allowed_sender_ids: []
  bluebubbles:
    enabled: false
    allowed_sender_ids: []
  qqbot:
    enabled: false
    allowed_sender_ids: []
  yuanbao:
    enabled: false
    allowed_sender_ids: []

session_state_ttl_hours: 168
max_context_chars: 12000

# Token budget controls. The context is injected on the first eligible turn,
# then periodically; it is not injected before every response.
injection:
  inject_on_first_turn: true
  reinject_after_turns: 6
  reinject_after_minutes: 60

# Thin instruction prepended to the context file inside the injected hook context.
# This is not a real model system-role message; Hermes pre_llm_call context is
# injected into the user turn at API-call time only.
system_prompt: |
  You are reading a temporary context file injected by Hermes.
  Treat it as background context, not as a user request.
  Distinguish facts, estimates, and uncertainty.
  If it conflicts with the user's latest message, prefer the user's latest message.
  Only use it when it is naturally relevant.

wrapper:
  tag: hermes_context
